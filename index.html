const DEFAULT_TOP_N = 200;

// distinct control. Adjust these arrays to change available options.
const WINDOW_DAY_PRESETS = [1, 2, 3, 4, 5, 6, 7]; // days (converted to hours internally)
const TOP_PRESETS = [100, 200, 500, "all"];

function initWindowHours() {
  const p = params.get("hours");
  if (p !== null) {
    const n = parseInt(p);
    if (n >= 1 && n <= 168) return n;
  }
  const saved = parseInt(localStorage.getItem(WINDOW_KEY) || "");
  if (saved >= 1 && saved <= 168) return saved;
  return DEFAULT_WINDOW_HOURS;
}
function initTopN() {
  const p = params.get("top");
  if (p !== null) {
    if (p === "all") return Infinity;
    const n = parseInt(p);
    if (n >= 1 && n <= 5000) return n;
  }
  const saved = localStorage.getItem(TOP_KEY);
  if (saved === "all") return Infinity;
  const n = parseInt(saved || "");
  if (n >= 1 && n <= 5000) return n;
  return DEFAULT_TOP_N;
}
let WINDOW_HOURS = initWindowHours();
let TOP_N = initTopN();

function detectLang() {
  const saved = localStorage.getItem(LANG_KEY);
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || "en").toLowerCase();
  return nav.startsWith("zh") ? "zh" : "en";
}
let LANG = detectLang();
const t = (key, ...args) => {
  const v = I18N[LANG][key];
  return typeof v === "function" ? v(...args) : v;
};

function applyStaticI18n() {
  document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";
  document.title = t("app_title");
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll(".lang-btn").forEach((btn) => {
    btn.classList.toggle("bg-yellow-600", btn.dataset.lang === LANG);
    btn.classList.toggle("text-black", btn.dataset.lang === LANG);
    btn.classList.toggle("font-semibold", btn.dataset.lang === LANG);
  });
}
function setLang(l) {
  if (!I18N[l] || l === LANG) return;
  LANG = l;
  localStorage.setItem(LANG_KEY, l);
  applyStaticI18n();
  renderWatchUI();
  if (LAST_DATA) render(LAST_DATA);
}
document.querySelectorAll(".lang-btn").forEach((btn) => {
  btn.addEventListener("click", () => setLang(btn.dataset.lang));
});

// ---------------------------------------------------------------------------
// Watchlist (localStorage)
// ---------------------------------------------------------------------------
// Shape: { [address]: "label" }
function loadWatch() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
  } catch (e) {}
  return {};
}
function saveWatch(w) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); } catch (e) {}
}
let WATCH = loadWatch();

function addWatch(addr, label) {
  addr = (addr || "").trim();
  if (!addr) return false;
  WATCH[addr] = (label || "").trim();
  saveWatch(WATCH);
  return true;
}
function removeWatch(addr) { delete WATCH[addr]; saveWatch(WATCH); }
function clearWatch() { WATCH = {}; saveWatch(WATCH); }

// Import shared URL: ?watch=addr1|label1,addr2|label2
function importFromUrlParam() {
  const spec = params.get("watch");
  if (!spec) return;
  const incoming = {};
  for (const piece of spec.split(",")) {
    const [a, l = ""] = piece.split("|");
    const addr = (a || "").trim();
    if (addr) incoming[addr] = decodeURIComponent(l || "").trim();
  }
  const n = Object.keys(incoming).length;
  if (!n) return;
  if (confirm(t("alert_import", n))) {
    WATCH = { ...WATCH, ...incoming };
    saveWatch(WATCH);
  }
  // Clean the URL so reloading doesn't re-prompt.
  params.delete("watch");
  const clean = location.pathname + (params.toString() ? "?" + params.toString() : "") + location.hash;
  history.replaceState(null, "", clean);
}
importFromUrlParam();

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
const fmtInt = (n) => Math.round(n).toLocaleString();
const fmt2 = (n) => n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function shortAddr(a) { return `${a.slice(0, 6)}…${a.slice(-4)}`; }

function fmtTime(ts) {
  if (!ts) return { full: "—", short: "—" };
  const cst = new Date(ts * 1000 + 8 * 3600 * 1000);
  const pad = (n) => String(n).padStart(2, "0");
  return {
    full: `${pad(cst.getUTCMonth() + 1)}-${pad(cst.getUTCDate())} ${pad(cst.getUTCHours())}:${pad(cst.getUTCMinutes())} +08`,
    short: `${pad(cst.getUTCHours())}:${pad(cst.getUTCMinutes())}`,
  };
}

// ---------------------------------------------------------------------------
// Watchlist UI
// ---------------------------------------------------------------------------
function renderWatchUI() {
  const list = document.getElementById("watch-list");
  const entries = Object.entries(WATCH);
  document.getElementById("watch-count").textContent = entries.length;
  if (!entries.length) {
    list.innerHTML = `<div class="text-xs text-gray-500 italic">${esc(t("watch_empty"))}</div>`;
    return;
  }
  list.innerHTML = entries.map(([addr, label]) => `
    <div class="flex items-center gap-2 bg-gray-900/60 rounded px-2 py-1 text-sm">
      <span class="text-yellow-300">★</span>
      <input data-addr="${esc(addr)}" class="watch-label-input bg-transparent border-b border-transparent hover:border-gray-600 focus:border-yellow-400 outline-none text-yellow-200 font-semibold px-1 py-0.5 min-w-[120px]"
        value="${esc(label)}" placeholder="${esc(t("watch_no_label"))}" />
      <span class="font-mono text-gray-400 text-xs" title="${esc(addr)}">${esc(shortAddr(addr))}</span>
      <button data-addr="${esc(addr)}" class="watch-remove ml-auto text-red-400 hover:text-red-300 text-xs">${esc(t("watch_remove"))}</button>
    </div>
  `).join("");
  list.querySelectorAll(".watch-remove").forEach((btn) => {
    btn.addEventListener("click", () => {
      removeWatch(btn.dataset.addr);
      renderWatchUI();
      if (LAST_DATA) render(LAST_DATA);
    });
  });
  list.querySelectorAll(".watch-label-input").forEach((inp) => {
    inp.addEventListener("change", () => {
      WATCH[inp.dataset.addr] = inp.value.trim();
      saveWatch(WATCH);
      if (LAST_DATA) render(LAST_DATA);
    });
  });
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
let LAST_DATA = null;

function render(data) {
  LAST_DATA = data;
  const updatedAt = data.updated || 0;
  const allEpochs = (data.epochs || []).slice().sort((a, b) => (b.epoch || 0) - (a.epoch || 0));
  const cutoff = Date.now() / 1000 - WINDOW_HOURS * 3600;
  let epochs = allEpochs.filter((e) => (e.timestamp || 0) >= cutoff);
  if (!epochs.length) epochs = allEpochs.slice(0, WINDOW_HOURS);

  // Aggregate
  const addrReward = new Map();
  const addrShards = new Map();
  const addrHits = new Map();
  let poolTotal = 0;
  for (const ep of epochs) {
    const rewards = ep.rewards || {};
    const shards = ep.miner_shards || {};
    for (const [a, r] of Object.entries(rewards)) {
      poolTotal += r;
      addrReward.set(a, (addrReward.get(a) || 0) + r);
      if (r > 0) addrHits.set(a, (addrHits.get(a) || 0) + 1);
    }
    for (const [a, s] of Object.entries(shards)) {
      addrShards.set(a, (addrShards.get(a) || 0) + s);
    }
  }

  const watchAddrs = new Set(Object.keys(WATCH));
  // All addresses that appear plus watched-but-inactive (so user can see "no reward" rows)
  const all = new Set([...addrReward.keys(), ...addrShards.keys(), ...watchAddrs]);

  const sortKey = (a) => [
    watchAddrs.has(a) ? 0 : 1,                // watched first
    -(addrReward.get(a) || 0),                // then by reward
    -(addrShards.get(a) || 0),                // then by shards
  ];
  const ranked = [...all].sort((a, b) => {
    const ka = sortKey(a), kb = sortKey(b);
    for (let i = 0; i < ka.length; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
    return 0;
  });
  const totalWallets = [...all].filter((a) => (addrReward.get(a) || 0) > 0 || (addrShards.get(a) || 0) > 0).length;
  const rewardedWallets = [...addrReward.values()].filter((v) => v > 0).length;

  // Always include all watched in display, plus top-N of the rest
  const nonWatchedRanked = ranked.filter((a) => !watchAddrs.has(a));
  const watched = ranked.filter((a) => watchAddrs.has(a));
  const display = [...watched, ...nonWatchedRanked.slice(0, TOP_N)];

  // My Wallets totals
  let myReward = 0, myHitEpochs = 0, myHitWallets = 0;
  for (const a of watchAddrs) {
    const r = addrReward.get(a) || 0;
    myReward += r;
    if (r > 0) myHitWallets++;
  }
  const epochsWithMyReward = epochs.filter((ep) => {
    const rw = ep.rewards || {};
    return [...watchAddrs].some((a) => (rw[a] || 0) > 0);
  });
  myHitEpochs = epochsWithMyReward.length;

  // Hero card
  const hero = document.getElementById("hero");
  if (watchAddrs.size > 0) {
    hero.classList.remove("hidden");
    document.getElementById("hero-hours").textContent = WINDOW_HOURS / 24;
    document.getElementById("hero-reward").textContent = fmt2(myReward);
    document.getElementById("hero-hit").textContent = myHitEpochs;
    document.getElementById("hero-epochs").textContent = epochs.length;
    document.getElementById("hero-wallets").textContent = myHitWallets;
    document.getElementById("hero-total").textContent = watchAddrs.size;
    document.getElementById("hero-share").textContent = poolTotal ? (myReward / poolTotal * 100).toFixed(2) : "0";
    document.getElementById("hero-pool").textContent = fmtInt(poolTotal);
  } else {
    hero.classList.add("hidden");
  }

  // Overview cards
  document.getElementById("cards").innerHTML = `
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">${esc(t("card_epochs"))}</div>
      <div class="text-2xl font-bold text-white">${epochs.length}</div>
      <div class="text-xs text-gray-500">${esc(t("card_epochs_sub", WINDOW_HOURS))}</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">${esc(t("card_pool"))}</div>
      <div class="text-2xl font-bold text-blue-400">${fmtInt(poolTotal)}</div>
      <div class="text-xs text-gray-500">${esc(t("card_pool_sub"))}</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">${esc(t("card_rewarded"))}</div>
      <div class="text-2xl font-bold text-green-400">${rewardedWallets}</div>
      <div class="text-xs text-gray-500">${esc(t("card_rewarded_sub"))}</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">${esc(t("card_active"))}</div>
      <div class="text-2xl font-bold text-purple-400">${totalWallets}</div>
      <div class="text-xs text-gray-500">${esc(t("card_active_sub"))}</div>
    </div>
  `;

  // Epoch header cells
  const headerCells = epochs.map((ep) => {
    const eid = ep.epoch ?? "?";
    const status = ep.chain_status || "?";
    const statusCls = status === "confirmed" ? "text-green-400" : status === "skipped" ? "text-red-400" : "text-gray-400";
    const sTot = Object.values(ep.miner_shards || {}).reduce((a, b) => a + b, 0);
    const mTot = Object.keys(ep.miner_shards || {}).length;
    const t = fmtTime(ep.timestamp);
    return `<th class="px-2 py-2 text-center min-w-[56px]"
      title="${esc(t.full)} | ${esc(status)} | ${mTot} miners | ${sTot} shards">
      <div class="font-mono font-bold text-white text-sm">${esc(eid)}</div>
      <div class="text-[10px] text-cyan-400 font-mono">${esc(t.short)}</div>
      <div class="text-[10px] ${statusCls}">${esc(status.slice(0, 4))}</div>
      <div class="text-[10px] text-gray-500">${mTot}m</div>
    </th>`;
  }).join("");

  document.getElementById("thead").innerHTML = `
    <tr class="bg-gray-900 border-b border-gray-700">
      <th class="px-3 py-2 text-left text-gray-400 sticky left-0 bg-gray-900 z-20">${esc(t("col_wallet"))}</th>
      <th class="px-2 py-2 text-center text-gray-400 text-xs">
        ${esc(t("col_reward"))}<br><span class='text-[10px] text-gray-500'>${esc(t("col_reward_sub", epochs.length, WINDOW_HOURS))}</span>
      </th>
      <th class="px-2 py-2 text-center text-gray-400 text-xs">${esc(t("col_shards"))}</th>
      ${headerCells}
    </tr>
  `;

  // Rows
  const rows = display.map((addr, i) => {
    const total = addrReward.get(addr) || 0;
    const shardsTot = addrShards.get(addr) || 0;
    const hits = addrHits.get(addr) || 0;
    const isWatched = watchAddrs.has(addr);
    const label = isWatched ? (WATCH[addr] || "") : "";
    const rowCls = isWatched ? "watch-row" : "";

    const cells = epochs.map((ep) => {
      const r = (ep.rewards || {})[addr] || 0;
      const s = (ep.miner_shards || {})[addr] || 0;
      if (s === 0 && r === 0) {
        return '<td class="px-1 py-1 text-center text-gray-700 text-xs">—</td>';
      }
      if (r > 0) {
        const alpha = Math.min(0.85, r / (isWatched ? 150 : 200)).toFixed(2);
        const bg = isWatched ? `rgba(250,204,21,${alpha})` : `rgba(59,130,246,${alpha})`;
        return `<td class="px-1 py-1 text-center font-mono text-xs"
          style="background:${bg}"
          title="${s} shards · ${r.toFixed(2)} reward">${Math.round(r)}</td>`;
      }
      return `<td class="px-1 py-1 text-center text-gray-500 text-[10px]" title="${s} shards">${s}s</td>`;
    }).join("");

    const nameHtml = isWatched
      ? `<span class="text-yellow-300">★</span>
         ${label ? `<span class="font-bold text-yellow-300" title="${esc(addr)}">${esc(label)}</span>
                    <span class="text-[10px] text-gray-500 font-mono ml-1">${esc(shortAddr(addr))}</span>`
                 : `<span class="font-mono text-yellow-300" title="${esc(addr)}">${esc(shortAddr(addr))}</span>`}`
      : `<span class="font-mono" title="${esc(addr)}">${esc(shortAddr(addr))}</span>`;

    const totalCls = isWatched ? "text-yellow-300 font-bold" : (total > 0 ? "text-green-400 font-bold" : "text-gray-500");

    return `<tr class="border-b border-gray-800 hover:bg-gray-800/50 cursor-pointer ${rowCls}" data-addr="${esc(addr)}" title="${esc(t("modal_title"))}">
      <td class="px-3 py-1 sticky left-0 bg-gray-900 z-10 whitespace-nowrap text-sm">
        <span class="text-gray-500 text-xs mr-2">#${i + 1}</span>
        ${nameHtml}
        <span class="text-[10px] text-gray-500 ml-1">· ${hits}ep</span>
      </td>
      <td class="px-2 py-1 text-center font-mono text-sm ${totalCls}">${fmtInt(total)}</td>
      <td class="px-2 py-1 text-center font-mono text-xs text-gray-400">${fmtInt(shardsTot)}</td>
      ${cells}
    </tr>`;
  }).join("");
  document.getElementById("tbody").innerHTML = rows || `<tr><td colspan="3" class="p-6 text-center text-gray-500">${esc(t("no_data"))}</td></tr>`;

  // Footer: rewarded per epoch
  const footerCells = epochs.map((ep) => {
    const rewards = ep.rewards || {};
    const nReward = Object.values(rewards).filter((v) => v && v > 0).length;
    const mTot = Object.keys(ep.miner_shards || {}).length;
    return `<td class="px-1 py-2 text-center font-mono text-xs text-cyan-300"
      title="${nReward} rewarded / ${mTot} miners">${nReward}</td>`;
  }).join("");
  document.getElementById("tfoot").innerHTML = `
    <tr class="bg-gray-900 border-t-2 border-gray-600 font-bold">
      <td class="px-3 py-2 sticky left-0 bg-gray-900 z-10 whitespace-nowrap text-cyan-300 text-sm">${esc(t("foot_rewarded"))}</td>
      <td class="px-2 py-2 text-center text-gray-500">—</td>
      <td class="px-2 py-2 text-center text-gray-500">—</td>
      ${footerCells}
    </tr>
  `;

  // Truncation notice
  const shownNonWatched = Math.min(TOP_N, nonWatchedRanked.length);
  if (nonWatchedRanked.length > shownNonWatched) {
    const full = new URL(location.href);
    full.searchParams.set("top", "all");
    document.getElementById("note").innerHTML =
      t("note_truncated", shownNonWatched, nonWatchedRanked.length) +
      `<a class="text-cyan-300 underline" href="${full.search}">${esc(t("note_show_all"))}</a> · ` +
      `${esc(t("note_or_try"))} <code class="text-cyan-300">?top=200</code>.`;
  } else {
    document.getElementById("note").textContent = "";
  }

  document.getElementById("subtitle").innerHTML =
    esc(t("subtitle", WINDOW_HOURS)) +
    `<a class="text-cyan-400 hover:underline" href="https://aliceprotocol.org" target="_blank" rel="noopener">${esc(t("data_source"))}</a>`;

  const updatedStr = updatedAt
    ? new Date(updatedAt * 1000).toISOString().replace("T", " ").slice(0, 19) + " UTC"
    : "—";
  const liveBadge = data._live
    ? ` · <span class="text-green-400">● ${esc(t("footer_live"))}</span>`
    : ` · <span class="text-amber-400">● ${esc(t("footer_cached"))}</span>`;
  document.getElementById("footer").innerHTML =
    esc(t("footer", updatedStr)) +
    `<a class="text-cyan-400 hover:underline" href="${DATA_URL}">${esc(t("footer_raw"))}</a>` +
    liveBadge;
}

// ---------------------------------------------------------------------------
// Load & poll
// ---------------------------------------------------------------------------
// Fetch cached JSON (retained history, ~200 epochs) and the live upstream API
// (latest ~50 epochs) in parallel, then merge. Live data wins per-epoch, so the
// page always shows the newest epoch even if the GitHub Actions cron is late.
async function fetchCached() {
  const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-cache" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
async function fetchLive() {
  const r = await fetch(LIVE_API_URL, { cache: "no-cache" });
  if (!r.ok) throw new Error("HTTP " + r.status);
  const list = await r.json();
  if (!Array.isArray(list)) throw new Error("unexpected shape");
  return list;
}
function mergeEpochs(cached, live) {
  const byId = new Map();
  for (const ep of cached || []) byId.set(Number(ep.epoch), ep);
  for (const ep of live || []) byId.set(Number(ep.epoch), ep);
  return [...byId.values()].sort((a, b) => (b.epoch || 0) - (a.epoch || 0));
}

async function load() {
  const [cachedRes, liveRes] = await Promise.allSettled([fetchCached(), fetchLive()]);
  const cached = cachedRes.status === "fulfilled" ? cachedRes.value : null;
  const live = liveRes.status === "fulfilled" ? liveRes.value : null;

  if (!cached && !live) {
    const msg = (cachedRes.reason && cachedRes.reason.message) || "no data";
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="3" class="p-6 text-center text-red-400">${esc(t("load_failed", msg))}</td></tr>`;
    return;
  }

  const epochs = mergeEpochs(cached ? cached.epochs : [], live);
  const updated = live ? Math.floor(Date.now() / 1000) : (cached ? cached.updated : 0);
  render({ updated, epochs, _live: !!live });
}

// ---------------------------------------------------------------------------
// Filter pills (window hours + top-N)
// ---------------------------------------------------------------------------
function pillClass(active) {
  return "px-2.5 py-1 rounded border transition-colors " + (active
    ? "bg-cyan-600 border-cyan-500 text-white font-semibold"
    : "border-gray-700 text-gray-300 hover:bg-gray-700");
}
function makePill(label, dataAttr, dataVal, active) {
  return `<button ${dataAttr}="${dataVal}" class="${pillClass(active)}">${label}</button>`;
}
function renderPills() {
  const winEl = document.getElementById("window-pills");
  winEl.innerHTML = WINDOW_DAY_PRESETS.map((d) =>
    makePill(`${d}d`, "data-hours", d * 24, d * 24 === WINDOW_HOURS)
  ).join("");
  winEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => setWindow(parseInt(btn.dataset.hours)));
  });

  const topEl = document.getElementById("top-pills");
  topEl.innerHTML = TOP_PRESETS.map((v) => {
    const active = (v === "all" && TOP_N === Infinity) || v === TOP_N;
    return makePill(String(v), "data-top", v, active);
  }).join("");
  topEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => setTopN(btn.dataset.top));
  });
}
function updateUrl() {
  const p = new URLSearchParams(location.search);
  if (WINDOW_HOURS !== DEFAULT_WINDOW_HOURS) p.set("hours", String(WINDOW_HOURS));
  else p.delete("hours");
  if (TOP_N === Infinity) p.set("top", "all");
  else if (TOP_N !== DEFAULT_TOP_N) p.set("top", String(TOP_N));
  else p.delete("top");
  const q = p.toString();
  history.replaceState(null, "", location.pathname + (q ? "?" + q : "") + location.hash);
}
function setWindow(h) {
  if (!(h >= 1 && h <= 168) || h === WINDOW_HOURS) return;
  WINDOW_HOURS = h;
  localStorage.setItem(WINDOW_KEY, String(h));
  updateUrl();
  renderPills();
  if (LAST_DATA) render(LAST_DATA);
  refreshModalIfOpen();
}
function setTopN(v) {
  const next = v === "all" ? Infinity : parseInt(v);
  if (!(next === Infinity || (next >= 1 && next <= 5000)) || next === TOP_N) return;
  TOP_N = next;
  localStorage.setItem(TOP_KEY, v === "all" ? "all" : String(next));
  updateUrl();
  renderPills();
  if (LAST_DATA) render(LAST_DATA);
}

// ---------------------------------------------------------------------------
// Wallet detail modal: fetch tx history and summarize in/out for the window
// ---------------------------------------------------------------------------
const HISTORY_LIMIT = 500;
const HISTORY_CACHE_TTL_MS = 60 * 1000;
const PLANCK_PER_ALICE = 1e12;
const DETAIL_HOURS = 168;                 // Detail tx table is fixed to last 7 days
const DAILY_DAYS = 7;                     // Daily overview covers last 7 days
const HISTORY_API = (addr, limit) =>
  `https://aliceprotocol.org/api/indexer/accounts/${encodeURIComponent(addr)}/history?limit=${limit}`;
const SUMMARY_API = (addr) =>
  `https://aliceprotocol.org/api/indexer/accounts/${encodeURIComponent(addr)}/summary`;
const historyCache = new Map(); // addr -> { fetchedAt, entries, rawLen }
const summaryCache = new Map(); // addr -> { fetchedAt, data, error }
let MODAL_ADDR = null;

function txAmountAlice(e) {
  // Rewards: amount is already a float in ALICE.
  // Transfers: amount is a string in planck units (1 ALICE = 1e12 planck).
  if (e.entry_type === "reward") return Number(e.amount) || 0;
  if (e.entry_type === "transfer") return (parseFloat(e.amount) || 0) / PLANCK_PER_ALICE;
  return 0;
}

async function fetchHistory(addr) {
  const cached = historyCache.get(addr);
  if (cached && Date.now() - cached.fetchedAt < HISTORY_CACHE_TTL_MS) return cached;
  const res = await fetch(HISTORY_API(addr, HISTORY_LIMIT), { cache: "no-cache" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const raw = Array.isArray(data.history) ? data.history : [];
  // Drop bookkeeping "extrinsic" entries (duplicates of transfers, amount=null).
  const entries = raw.filter((e) => e.entry_type !== "extrinsic");
  const payload = { fetchedAt: Date.now(), entries, rawLen: raw.length };
  historyCache.set(addr, payload);
  return payload;
}

// /summary returns { balance:{free,reserved,frozen}, stake_summary:{staked_total,stakes}, reward_summary:{total_reward,epochs,...}, source }
// Balance values are already in ALICE (floats), not planck.
async function fetchSummary(addr) {
  const cached = summaryCache.get(addr);
  if (cached && Date.now() - cached.fetchedAt < HISTORY_CACHE_TTL_MS) return cached;
  const res = await fetch(SUMMARY_API(addr), { cache: "no-cache" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const payload = { fetchedAt: Date.now(), data };
  summaryCache.set(addr, payload);
  return payload;
}

function summarizeHistory(addr, entries, rawLen, windowHours) {
  const cutoffMs = Date.now() - windowHours * 3600 * 1000;
  const inWindow = entries.filter((e) => (e.timestamp_ms || 0) >= cutoffMs);
  let rewardIn = 0, xferIn = 0, xferOut = 0;
  let rewardCount = 0, xferInCount = 0, xferOutCount = 0;
  for (const e of inWindow) {
    const amt = txAmountAlice(e);
    if (e.entry_type === "reward" && e.to_address === addr) {
      rewardIn += amt; rewardCount++;
    } else if (e.entry_type === "transfer") {
      if (e.from_address === addr && e.to_address !== addr) {
        xferOut += amt; xferOutCount++;
      } else if (e.to_address === addr && e.from_address !== addr) {
        xferIn += amt; xferInCount++;
      }
    }
  }
  const oldest = entries[entries.length - 1];
  // Truncation = we hit the API limit AND oldest known entry still falls inside
  // the window, i.e. there may be entries we didn't fetch.
  const mayBeTruncated = rawLen >= HISTORY_LIMIT && oldest && (oldest.timestamp_ms || 0) > cutoffMs;
  return {
    rows: inWindow,
    rewardIn, xferIn, xferOut, net: rewardIn + xferIn - xferOut,
    rewardCount, xferInCount, xferOutCount,
    totalFetched: entries.length,
    mayBeTruncated,
  };
}

function counterparty(e, addr) {
  if (e.entry_type === "reward") return null;
  if (e.from_address === addr) return e.to_address;
  if (e.to_address === addr) return e.from_address;
  return null;
}

function typeBadge(e, addr) {
  if (e.entry_type === "reward") {
    return `<span class="px-1.5 py-0.5 rounded bg-green-900/60 text-green-300 text-[10px] whitespace-nowrap">★ ${esc(t("modal_type_reward"))}${e.epoch != null ? " #" + e.epoch : ""}</span>`;
  }
  if (e.entry_type === "transfer") {
    if (e.from_address === addr && e.to_address !== addr)
      return `<span class="px-1.5 py-0.5 rounded bg-red-900/60 text-red-300 text-[10px] whitespace-nowrap">↗ ${esc(t("modal_type_out"))}</span>`;
    if (e.to_address === addr && e.from_address !== addr)
      return `<span class="px-1.5 py-0.5 rounded bg-blue-900/60 text-blue-300 text-[10px] whitespace-nowrap">↘ ${esc(t("modal_type_in"))}</span>`;
    return `<span class="px-1.5 py-0.5 rounded bg-gray-700 text-gray-300 text-[10px] whitespace-nowrap">${esc(t("modal_type_self"))}</span>`;
  }
  return `<span class="px-1.5 py-0.5 rounded bg-gray-700 text-gray-300 text-[10px] whitespace-nowrap">${esc(e.entry_type || "?")}</span>`;
}

function openWalletModal(addr) {
  MODAL_ADDR = addr;
  const modal = document.getElementById("wallet-modal");
  const label = WATCH[addr] || "";
  document.getElementById("modal-title").innerHTML =
    (label ? `<span class="text-yellow-300">★ ${esc(label)}</span> <span class="text-gray-500">·</span> ` : "") +
    `<span>${esc(t("modal_title"))}</span>`;
  document.getElementById("modal-subaddr").textContent = addr;
  document.getElementById("modal-api-link").href = HISTORY_API(addr, HISTORY_LIMIT);
  document.getElementById("modal-body").innerHTML =
    `<div class="text-gray-400 p-8 text-center">${esc(t("loading"))}</div>`;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
  // Fetch balance summary + tx history in parallel; render whatever succeeds.
  Promise.allSettled([fetchSummary(addr), fetchHistory(addr)]).then(([sumRes, histRes]) => {
    if (MODAL_ADDR !== addr) return;
    const summary = sumRes.status === "fulfilled" ? sumRes.value.data : null;
    const summaryErr = sumRes.status === "rejected" ? sumRes.reason : null;
    const history = histRes.status === "fulfilled" ? histRes.value : null;
    const historyErr = histRes.status === "rejected" ? histRes.reason : null;
    renderWalletModalBody(addr, { summary, summaryErr, history, historyErr });
  });
}

function closeWalletModal() {
  MODAL_ADDR = null;
  document.getElementById("wallet-modal").classList.add("hidden");
  document.body.style.overflow = "";
}

function renderBalanceBanner(summary, err) {
  if (err) {
    return `<div class="bg-red-900/30 ring-1 ring-red-700/50 rounded p-3 mb-4 text-xs text-red-300">
      ${esc(t("balance_failed", err.message || String(err)))}
    </div>`;
  }
  if (!summary) {
    return `<div class="bg-gray-800 rounded p-3 mb-4 text-xs text-gray-500 text-center">${esc(t("loading"))}</div>`;
  }
  const b = summary.balance || { free: 0, reserved: 0, frozen: 0 };
  const ss = summary.stake_summary || { staked_total: 0, stakes: [] };
  const rs = summary.reward_summary || { total_reward: 0, epochs: 0 };
  const stakes = Array.isArray(ss.stakes) ? ss.stakes : [];
  const stakesLabel = stakes.length
    ? stakes.map((s) => (s && s.type) || "").filter(Boolean).join(" + ")
    : "";
  const srcBadge = summary.source
    ? `<span class="text-[10px] text-gray-500 ml-2">${esc(t("balance_source"))}: ${esc(summary.source)}</span>`
    : "";
  return `<div class="bg-gradient-to-r from-slate-800 to-slate-900 ring-1 ring-slate-700 rounded-lg p-4 mb-4">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      <div>
        <div class="text-[10px] text-gray-400 uppercase tracking-wide">${esc(t("balance_free"))}</div>
        <div class="text-2xl font-bold text-white font-mono leading-tight">${fmt2(Number(b.free) || 0)}</div>
        <div class="text-[10px] text-gray-500">ALICE${srcBadge}</div>
      </div>
      <div>
        <div class="text-[10px] text-gray-400 uppercase tracking-wide">${esc(t("balance_reserved"))}</div>
        <div class="text-lg font-mono text-gray-300">${fmt2(Number(b.reserved) || 0)}</div>
      </div>
      <div>
        <div class="text-[10px] text-gray-400 uppercase tracking-wide">${esc(t("balance_frozen"))}</div>
        <div class="text-lg font-mono text-gray-300">${fmt2(Number(b.frozen) || 0)}</div>
      </div>
      <div>
        <div class="text-[10px] text-gray-400 uppercase tracking-wide">${esc(t("balance_staked"))}</div>
        <div class="text-lg font-mono ${Number(ss.staked_total) > 0 ? "text-cyan-300" : "text-gray-500"}">${fmt2(Number(ss.staked_total) || 0)}</div>
        ${stakesLabel ? `<div class="text-[10px] text-cyan-400">${esc(stakesLabel)}</div>` : ""}
      </div>
      <div>
        <div class="text-[10px] text-gray-400 uppercase tracking-wide">${esc(t("balance_lifetime"))}</div>
        <div class="text-lg font-mono text-green-400">${fmt2(Number(rs.total_reward) || 0)}</div>
        <div class="text-[10px] text-gray-500">${esc(t("balance_epochs", Number(rs.epochs) || 0))}</div>
      </div>
    </div>
  </div>`;
}

// Day key YYYY-MM-DD in UTC+08 (matches fmtTime display).
function dayBucket(tsMs) {
  const d = new Date(tsMs + 8 * 3600 * 1000);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, "0");
  const day = String(d.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function summarizeDaily(addr, entries, days) {
  const now = Date.now();
  const order = [];
  const buckets = new Map();
  // Pre-seed the last N days (today, yesterday, …) so empty days still render.
  for (let i = 0; i < days; i++) {
    const key = dayBucket(now - i * 86400000);
    const b = { key, rewardIn: 0, xferIn: 0, xferOut: 0, rewardCount: 0, xferInCount: 0, xferOutCount: 0 };
    buckets.set(key, b);
    order.push(b);
  }
  const cutoffMs = now - days * 86400000;
  for (const e of entries) {
    const ts = e.timestamp_ms || 0;
    if (ts < cutoffMs) continue;
    const b = buckets.get(dayBucket(ts));
    if (!b) continue;
    const amt = txAmountAlice(e);
    if (e.entry_type === "reward" && e.to_address === addr) {
      b.rewardIn += amt; b.rewardCount++;
    } else if (e.entry_type === "transfer") {
      if (e.from_address === addr && e.to_address !== addr) {
        b.xferOut += amt; b.xferOutCount++;
      } else if (e.to_address === addr && e.from_address !== addr) {
        b.xferIn += amt; b.xferInCount++;
      }
    }
  }
  return order; // already newest-first
}

function renderWindowOverview(addr, history) {
  const s = summarizeHistory(addr, history.entries, history.rawLen, WINDOW_HOURS);
  const statCard = (label, val, cls, sub) =>
    `<div class="bg-gray-800 rounded p-3">
      <div class="text-[11px] text-gray-400">${esc(label)}</div>
      <div class="text-lg font-bold ${cls} font-mono">${val}</div>
      ${sub ? `<div class="text-[10px] text-gray-500">${esc(sub)}</div>` : ""}
    </div>`;
  const signedNet = (s.net >= 0 ? "+" : "") + fmt2(s.net);
  const stats = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
      ${statCard(t("modal_reward_in"), "+" + fmt2(s.rewardIn), "text-green-400", t("modal_count", s.rewardCount))}
      ${statCard(t("modal_transfer_in"), "+" + fmt2(s.xferIn), "text-blue-400", t("modal_count", s.xferInCount))}
      ${statCard(t("modal_transfer_out"), "-" + fmt2(s.xferOut), "text-red-400", t("modal_count", s.xferOutCount))}
      ${statCard(t("modal_net"), signedNet, s.net >= 0 ? "text-green-400" : "text-red-400", "")}
    </div>`;
  const header = `
    <div class="text-xs mb-2 flex-wrap gap-2">
      <span class="text-gray-300 font-semibold">${esc(t("overview_window"))}</span>
      <span class="text-cyan-300 font-semibold ml-2">${WINDOW_HOURS / 24}d</span>
      <span class="text-gray-500 mx-1">·</span>
      <span class="text-gray-400">${s.rows.length} ${esc(t("modal_entries"))}</span>
    </div>`;
  return header + stats;
}

function renderDailyOverview(addr, history) {
  const days = summarizeDaily(addr, history.entries, DAILY_DAYS);
  const header = `
    <div class="text-xs mb-2 mt-4 flex-wrap gap-2">
      <span class="text-gray-300 font-semibold">${esc(t("overview_daily"))}</span>
      <span class="text-cyan-300 font-semibold ml-2">${esc(t("overview_daily_sub", DAILY_DAYS))}</span>
    </div>`;
  let tR = 0, tIn = 0, tOut = 0, cR = 0, cIn = 0, cOut = 0;
  for (const d of days) {
    tR += d.rewardIn; tIn += d.xferIn; tOut += d.xferOut;
    cR += d.rewardCount; cIn += d.xferInCount; cOut += d.xferOutCount;
  }
  const tNet = tR + tIn - tOut;
  const amtCell = (cls, val, cnt) => `
    <td class="px-2 py-1 text-right">
      <div class="font-mono text-sm ${cls}">${val}</div>
      <div class="text-[10px] text-gray-500">${cnt ? esc(t("modal_count", cnt)) : "—"}</div>
    </td>`;
  const netCls = (n) => Math.abs(n) < 1e-9 ? "text-gray-500" : (n > 0 ? "text-green-400" : "text-red-400");
  const rowsHtml = days.map((d) => {
    const net = d.rewardIn + d.xferIn - d.xferOut;
    const signed = (net >= 0 ? "+" : "") + fmt2(net);
    return `<tr class="border-b border-gray-800">
      <td class="px-2 py-1 text-xs text-gray-300 font-mono whitespace-nowrap">${esc(d.key)}</td>
      ${amtCell("text-green-300", "+" + fmt2(d.rewardIn), d.rewardCount)}
      ${amtCell("text-blue-300", "+" + fmt2(d.xferIn), d.xferInCount)}
      ${amtCell("text-red-300", "-" + fmt2(d.xferOut), d.xferOutCount)}
      <td class="px-2 py-1 text-right font-mono text-sm ${netCls(net)} whitespace-nowrap">${signed}</td>
    </tr>`;
  }).join("");
  const signedTotal = (tNet >= 0 ? "+" : "") + fmt2(tNet);
  return header + `<div class="rounded border border-gray-700 overflow-hidden mb-4">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-800">
        <tr>
          <th class="px-2 py-2 text-left text-[10px] text-gray-400 font-normal uppercase tracking-wide">${esc(t("daily_col_date"))}</th>
          <th class="px-2 py-2 text-right text-[10px] text-gray-400 font-normal uppercase tracking-wide">${esc(t("modal_reward_in"))}</th>
          <th class="px-2 py-2 text-right text-[10px] text-gray-400 font-normal uppercase tracking-wide">${esc(t("modal_transfer_in"))}</th>
          <th class="px-2 py-2 text-right text-[10px] text-gray-400 font-normal uppercase tracking-wide">${esc(t("modal_transfer_out"))}</th>
          <th class="px-2 py-2 text-right text-[10px] text-gray-400 font-normal uppercase tracking-wide">${esc(t("modal_net"))}</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot class="bg-gray-800/70 border-t-2 border-gray-600">
        <tr>
          <td class="px-2 py-2 text-xs font-bold text-gray-200">${esc(t("daily_total"))}</td>
          ${amtCell("text-green-300 font-bold", "+" + fmt2(tR), cR)}
          ${amtCell("text-blue-300 font-bold", "+" + fmt2(tIn), cIn)}
          ${amtCell("text-red-300 font-bold", "-" + fmt2(tOut), cOut)}
          <td class="px-2 py-2 text-right font-mono text-sm font-bold ${netCls(tNet)}">${signedTotal}</td>
        </tr>
      </tfoot>
    </table>
  </div>`;
}

function renderDetailSection(addr, history) {
  const s = summarizeHistory(addr, history.entries, history.rawLen, DETAIL_HOURS);
  const header = `
    <div class="flex items-center justify-between text-xs text-gray-400 mb-2 flex-wrap gap-2">
      <div class="font-semibold text-gray-300">${esc(t("detail_header", DAILY_DAYS))} <span class="text-gray-500 font-normal">· ${s.rows.length} ${esc(t("modal_entries"))}</span></div>
      ${s.mayBeTruncated ? `<div class="text-amber-400">${esc(t("modal_truncated"))}</div>` : ""}
    </div>`;
  if (s.rows.length === 0) {
    return header + `<div class="p-6 text-center text-gray-500">${esc(t("modal_no_tx"))}</div>`;
  }
  const rowsHtml = s.rows.map((e) => {
    const amt = txAmountAlice(e);
    const tm = fmtTime(Math.floor((e.timestamp_ms || 0) / 1000));
    const cp = counterparty(e, addr);
    const cpCell = cp ? `<span title="${esc(cp)}">${esc(shortAddr(cp))}</span>` : "<span class=\"text-gray-600\">—</span>";
    const isOut = e.entry_type === "transfer" && e.from_address === addr && e.to_address !== addr;
    const signed = (isOut ? "-" : "+") + fmt2(amt);
    const amtCls = isOut ? "text-red-300" : "text-green-300";
    return `<tr class="border-b border-gray-800">
      <td class="px-2 py-1 text-xs text-gray-400 font-mono whitespace-nowrap">${esc(tm.full)}</td>
      <td class="px-2 py-1">${typeBadge(e, addr)}</td>
      <td class="px-2 py-1 text-xs text-gray-400 font-mono">${cpCell}</td>
      <td class="px-2 py-1 text-right font-mono text-sm ${amtCls} whitespace-nowrap">${signed}</td>
    </tr>`;
  }).join("");
  return header + `
    <div class="max-h-[50vh] overflow-y-auto rounded border border-gray-700">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-800 sticky top-0">
          <tr>
            <th class="px-2 py-2 text-left text-[11px] text-gray-400 font-normal">${esc(t("modal_col_time"))}</th>
            <th class="px-2 py-2 text-left text-[11px] text-gray-400 font-normal">${esc(t("modal_col_type"))}</th>
            <th class="px-2 py-2 text-left text-[11px] text-gray-400 font-normal">${esc(t("modal_col_counterparty"))}</th>
            <th class="px-2 py-2 text-right text-[11px] text-gray-400 font-normal">${esc(t("modal_col_amount"))}</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
}

function renderWalletModalBody(addr, payload) {
  const banner = renderBalanceBanner(payload.summary, payload.summaryErr);
  const body = document.getElementById("modal-body");
  if (!payload.history) {
    const errMsg = payload.historyErr ? t("load_failed", payload.historyErr.message) : t("loading");
    body.innerHTML = banner + `<div class="text-gray-400 p-6 text-center text-xs">${esc(errMsg)}</div>`;
    return;
  }
  const windowOv = renderWindowOverview(addr, payload.history);
  const dailyOv = renderDailyOverview(addr, payload.history);
  const detail = renderDetailSection(addr, payload.history);
  body.innerHTML = banner + windowOv + dailyOv + detail;
}

function refreshModalIfOpen() {
  if (!MODAL_ADDR) return;
  const h = historyCache.get(MODAL_ADDR);
  const s = summaryCache.get(MODAL_ADDR);
  if (h || s) {
    renderWalletModalBody(MODAL_ADDR, {
      summary: s ? s.data : null,
      summaryErr: null,
      history: h || null,
      historyErr: null,
    });
  }
}

// Row click delegation (tbody element is static; its innerHTML is replaced).
document.getElementById("tbody").addEventListener("click", (e) => {
  const tr = e.target.closest("tr[data-addr]");
  if (tr) openWalletModal(tr.dataset.addr);
});
document.getElementById("modal-close").addEventListener("click", closeWalletModal);
document.getElementById("wallet-modal").addEventListener("click", (e) => {
  // Only close when the user clicks the dimmed backdrop, not the inner panel.
  if (e.target.id === "wallet-modal") closeWalletModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && MODAL_ADDR) closeWalletModal();
});

applyStaticI18n();
renderPills();
renderWatchUI();
load();
setInterval(load, AUTO_REFRESH_MS);
</script>
