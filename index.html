<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alice Protocol Mining Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-track { background: #1e293b; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  .watch-row { background: rgba(250, 204, 21, 0.08); }
  .watch-row td:first-child { border-left: 3px solid #eab308; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>
<body class="text-gray-200 p-4">

<div class="max-w-[95vw] mx-auto">
  <div class="flex items-baseline justify-between mb-4 flex-wrap gap-2">
    <h1 class="text-2xl font-bold text-white">Alice Protocol Mining Monitor</h1>
    <div class="text-xs text-gray-500" id="subtitle">Loading…</div>
  </div>

  <!-- My Wallets hero card -->
  <div id="hero" class="hidden bg-gradient-to-r from-yellow-900/60 to-amber-900/40 ring-1 ring-yellow-500/40 rounded-lg p-5 mb-4">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="text-sm text-yellow-200">★ My Wallets · reward in last <span id="hero-hours">24</span>h</div>
        <div class="text-4xl font-bold text-yellow-300 font-mono"><span id="hero-reward">0</span> <span class="text-xl text-yellow-400">ALICE</span></div>
      </div>
      <div class="text-right">
        <div class="text-xs text-gray-400">Hit epochs</div>
        <div class="text-2xl font-bold text-yellow-200"><span id="hero-hit">0</span><span class="text-gray-500">/<span id="hero-epochs">0</span></span></div>
        <div class="text-xs text-gray-400 mt-1">Rewarded wallets ★ <span id="hero-wallets">0</span>/<span id="hero-total">0</span></div>
      </div>
      <div class="text-right">
        <div class="text-xs text-gray-400">Share of pool</div>
        <div class="text-2xl font-bold text-green-400"><span id="hero-share">0</span>%</div>
        <div class="text-xs text-gray-400 mt-1">pool: <span id="hero-pool">0</span></div>
      </div>
    </div>
  </div>

  <!-- My Wallets management -->
  <details class="bg-gray-800 rounded-lg p-4 mb-4" id="watch-panel">
    <summary class="flex items-center justify-between">
      <span class="text-sm font-bold text-gray-200">👛 My Wallets <span class="text-xs text-gray-500 font-normal">(<span id="watch-count">0</span> · saved in your browser)</span></span>
      <span class="text-xs text-cyan-400">toggle ▾</span>
    </summary>
    <div class="mt-4 space-y-3">
      <div class="flex gap-2 flex-wrap items-center">
        <input id="watch-addr" type="text" placeholder="Wallet address (a2...)"
          class="flex-1 min-w-[280px] bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm font-mono" />
        <input id="watch-label" type="text" placeholder="Label / 备注 (optional)"
          class="flex-1 min-w-[180px] bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm" />
        <button id="watch-add" class="bg-yellow-600 hover:bg-yellow-500 text-black font-semibold rounded px-4 py-2 text-sm">Add</button>
      </div>
      <div id="watch-list" class="space-y-1"></div>
      <div class="flex gap-2 flex-wrap pt-2 border-t border-gray-700 text-xs">
        <button id="watch-export" class="text-cyan-400 hover:underline">Export JSON</button>
        <span class="text-gray-600">·</span>
        <button id="watch-import" class="text-cyan-400 hover:underline">Import JSON</button>
        <span class="text-gray-600">·</span>
        <button id="watch-share" class="text-cyan-400 hover:underline">Copy share link</button>
        <span class="text-gray-600">·</span>
        <button id="watch-clear" class="text-red-400 hover:underline">Clear all</button>
        <span class="ml-auto text-gray-500">Stored in localStorage · private to this browser</span>
      </div>
    </div>
  </details>

  <!-- Overview cards -->
  <div id="cards" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></div>

  <!-- Table -->
  <div class="bg-gray-800 rounded-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm" id="table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
  <div id="note" class="text-xs text-amber-400 mt-2"></div>

  <div class="text-xs text-gray-600 mt-4 text-center" id="footer"></div>
</div>

<script>
// ---------------------------------------------------------------------------
// Config (via URL params)
// ---------------------------------------------------------------------------
const params = new URLSearchParams(location.search);
const WINDOW_HOURS = Math.max(1, Math.min(parseInt(params.get("hours") || "24"), 168));
const topParam = params.get("top");
const TOP_N = topParam === "all" ? Infinity : Math.max(1, Math.min(parseInt(topParam || "50"), 5000));
const DATA_URL = "data/epochs.json";
const AUTO_REFRESH_MS = 5 * 60 * 1000;
const STORAGE_KEY = "alice_monitor_watchlist";

// ---------------------------------------------------------------------------
// Watchlist (localStorage)
// ---------------------------------------------------------------------------
// Shape: { [address]: "label" }
function loadWatch() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
  } catch (e) {}
  return {};
}
function saveWatch(w) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); } catch (e) {}
}
let WATCH = loadWatch();

function addWatch(addr, label) {
  addr = (addr || "").trim();
  if (!addr) return false;
  WATCH[addr] = (label || "").trim();
  saveWatch(WATCH);
  return true;
}
function removeWatch(addr) { delete WATCH[addr]; saveWatch(WATCH); }
function clearWatch() { WATCH = {}; saveWatch(WATCH); }

// Import shared URL: ?watch=addr1|label1,addr2|label2
function importFromUrlParam() {
  const spec = params.get("watch");
  if (!spec) return;
  const incoming = {};
  for (const piece of spec.split(",")) {
    const [a, l = ""] = piece.split("|");
    const addr = (a || "").trim();
    if (addr) incoming[addr] = decodeURIComponent(l || "").trim();
  }
  const n = Object.keys(incoming).length;
  if (!n) return;
  if (confirm(`Import ${n} wallet(s) from the URL into your watchlist?`)) {
    WATCH = { ...WATCH, ...incoming };
    saveWatch(WATCH);
  }
  // Clean the URL so reloading doesn't re-prompt.
  params.delete("watch");
  const clean = location.pathname + (params.toString() ? "?" + params.toString() : "") + location.hash;
  history.replaceState(null, "", clean);
}
importFromUrlParam();

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
const fmtInt = (n) => Math.round(n).toLocaleString();
const fmt2 = (n) => n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function shortAddr(a) { return `${a.slice(0, 6)}…${a.slice(-4)}`; }

function fmtTime(ts) {
  if (!ts) return { full: "—", short: "—" };
  const cst = new Date(ts * 1000 + 8 * 3600 * 1000);
  const pad = (n) => String(n).padStart(2, "0");
  return {
    full: `${pad(cst.getUTCMonth() + 1)}-${pad(cst.getUTCDate())} ${pad(cst.getUTCHours())}:${pad(cst.getUTCMinutes())} +08`,
    short: `${pad(cst.getUTCHours())}:${pad(cst.getUTCMinutes())}`,
  };
}

// ---------------------------------------------------------------------------
// Watchlist UI
// ---------------------------------------------------------------------------
function renderWatchUI() {
  const list = document.getElementById("watch-list");
  const entries = Object.entries(WATCH);
  document.getElementById("watch-count").textContent = entries.length;
  if (!entries.length) {
    list.innerHTML = '<div class="text-xs text-gray-500 italic">No wallets yet. Add one above — it stays on this browser only.</div>';
    return;
  }
  list.innerHTML = entries.map(([addr, label]) => `
    <div class="flex items-center gap-2 bg-gray-900/60 rounded px-2 py-1 text-sm">
      <span class="text-yellow-300">★</span>
      <input data-addr="${esc(addr)}" class="watch-label-input bg-transparent border-b border-transparent hover:border-gray-600 focus:border-yellow-400 outline-none text-yellow-200 font-semibold px-1 py-0.5 min-w-[120px]"
        value="${esc(label)}" placeholder="(no label)" />
      <span class="font-mono text-gray-400 text-xs" title="${esc(addr)}">${esc(shortAddr(addr))}</span>
      <button data-addr="${esc(addr)}" class="watch-remove ml-auto text-red-400 hover:text-red-300 text-xs">remove</button>
    </div>
  `).join("");
  list.querySelectorAll(".watch-remove").forEach((btn) => {
    btn.addEventListener("click", () => {
      removeWatch(btn.dataset.addr);
      renderWatchUI();
      if (LAST_DATA) render(LAST_DATA);
    });
  });
  list.querySelectorAll(".watch-label-input").forEach((inp) => {
    inp.addEventListener("change", () => {
      WATCH[inp.dataset.addr] = inp.value.trim();
      saveWatch(WATCH);
      if (LAST_DATA) render(LAST_DATA);
    });
  });
}

document.getElementById("watch-add").addEventListener("click", () => {
  const addrInp = document.getElementById("watch-addr");
  const labelInp = document.getElementById("watch-label");
  if (addWatch(addrInp.value, labelInp.value)) {
    addrInp.value = "";
    labelInp.value = "";
    renderWatchUI();
    if (LAST_DATA) render(LAST_DATA);
  }
});
document.getElementById("watch-addr").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("watch-add").click();
});
document.getElementById("watch-label").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("watch-add").click();
});
document.getElementById("watch-clear").addEventListener("click", () => {
  if (Object.keys(WATCH).length && confirm("Remove all watched wallets from this browser?")) {
    clearWatch();
    renderWatchUI();
    if (LAST_DATA) render(LAST_DATA);
  }
});
document.getElementById("watch-export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(WATCH, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "alice-watchlist.json"; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("watch-import").addEventListener("click", () => {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json,.json";
  inp.addEventListener("change", () => {
    const f = inp.files && inp.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
          WATCH = { ...WATCH, ...parsed };
          saveWatch(WATCH);
          renderWatchUI();
          if (LAST_DATA) render(LAST_DATA);
        } else {
          alert("Invalid JSON shape: expected { address: label }.");
        }
      } catch (e) {
        alert("Failed to parse JSON: " + e.message);
      }
    };
    reader.readAsText(f);
  });
  inp.click();
});
document.getElementById("watch-share").addEventListener("click", async () => {
  const parts = Object.entries(WATCH).map(([a, l]) => a + (l ? "|" + encodeURIComponent(l) : ""));
  if (!parts.length) { alert("Watchlist is empty."); return; }
  const url = location.origin + location.pathname + "?watch=" + parts.join(",");
  try {
    await navigator.clipboard.writeText(url);
    alert("Share link copied to clipboard.");
  } catch (e) {
    prompt("Copy this URL:", url);
  }
});

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
let LAST_DATA = null;

function render(data) {
  LAST_DATA = data;
  const updatedAt = data.updated || 0;
  const allEpochs = (data.epochs || []).slice().sort((a, b) => (b.epoch || 0) - (a.epoch || 0));
  const cutoff = Date.now() / 1000 - WINDOW_HOURS * 3600;
  let epochs = allEpochs.filter((e) => (e.timestamp || 0) >= cutoff);
  if (!epochs.length) epochs = allEpochs.slice(0, WINDOW_HOURS);

  // Aggregate
  const addrReward = new Map();
  const addrShards = new Map();
  const addrHits = new Map();
  let poolTotal = 0;
  for (const ep of epochs) {
    const rewards = ep.rewards || {};
    const shards = ep.miner_shards || {};
    for (const [a, r] of Object.entries(rewards)) {
      poolTotal += r;
      addrReward.set(a, (addrReward.get(a) || 0) + r);
      if (r > 0) addrHits.set(a, (addrHits.get(a) || 0) + 1);
    }
    for (const [a, s] of Object.entries(shards)) {
      addrShards.set(a, (addrShards.get(a) || 0) + s);
    }
  }

  const watchAddrs = new Set(Object.keys(WATCH));
  // All addresses that appear plus watched-but-inactive (so user can see "no reward" rows)
  const all = new Set([...addrReward.keys(), ...addrShards.keys(), ...watchAddrs]);

  const sortKey = (a) => [
    watchAddrs.has(a) ? 0 : 1,                // watched first
    -(addrReward.get(a) || 0),                // then by reward
    -(addrShards.get(a) || 0),                // then by shards
  ];
  const ranked = [...all].sort((a, b) => {
    const ka = sortKey(a), kb = sortKey(b);
    for (let i = 0; i < ka.length; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
    return 0;
  });
  const totalWallets = [...all].filter((a) => (addrReward.get(a) || 0) > 0 || (addrShards.get(a) || 0) > 0).length;
  const rewardedWallets = [...addrReward.values()].filter((v) => v > 0).length;

  // Always include all watched in display, plus top-N of the rest
  const nonWatchedRanked = ranked.filter((a) => !watchAddrs.has(a));
  const watched = ranked.filter((a) => watchAddrs.has(a));
  const display = [...watched, ...nonWatchedRanked.slice(0, TOP_N)];

  // My Wallets totals
  let myReward = 0, myHitEpochs = 0, myHitWallets = 0;
  for (const a of watchAddrs) {
    const r = addrReward.get(a) || 0;
    myReward += r;
    if (r > 0) myHitWallets++;
  }
  const epochsWithMyReward = epochs.filter((ep) => {
    const rw = ep.rewards || {};
    return [...watchAddrs].some((a) => (rw[a] || 0) > 0);
  });
  myHitEpochs = epochsWithMyReward.length;

  // Hero card
  const hero = document.getElementById("hero");
  if (watchAddrs.size > 0) {
    hero.classList.remove("hidden");
    document.getElementById("hero-hours").textContent = WINDOW_HOURS;
    document.getElementById("hero-reward").textContent = fmt2(myReward);
    document.getElementById("hero-hit").textContent = myHitEpochs;
    document.getElementById("hero-epochs").textContent = epochs.length;
    document.getElementById("hero-wallets").textContent = myHitWallets;
    document.getElementById("hero-total").textContent = watchAddrs.size;
    document.getElementById("hero-share").textContent = poolTotal ? (myReward / poolTotal * 100).toFixed(2) : "0";
    document.getElementById("hero-pool").textContent = fmtInt(poolTotal);
  } else {
    hero.classList.add("hidden");
  }

  // Overview cards
  document.getElementById("cards").innerHTML = `
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">Epochs in window</div>
      <div class="text-2xl font-bold text-white">${epochs.length}</div>
      <div class="text-xs text-gray-500">last ${WINDOW_HOURS}h</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">Pool Total</div>
      <div class="text-2xl font-bold text-blue-400">${fmtInt(poolTotal)}</div>
      <div class="text-xs text-gray-500">ALICE distributed</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">Rewarded Wallets</div>
      <div class="text-2xl font-bold text-green-400">${rewardedWallets}</div>
      <div class="text-xs text-gray-500">received &gt; 0 in window</div>
    </div>
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="text-xs text-gray-400">Active Miners</div>
      <div class="text-2xl font-bold text-purple-400">${totalWallets}</div>
      <div class="text-xs text-gray-500">submitted shards</div>
    </div>
  `;

  // Epoch header cells
  const headerCells = epochs.map((ep) => {
    const eid = ep.epoch ?? "?";
    const status = ep.chain_status || "?";
    const statusCls = status === "confirmed" ? "text-green-400" : status === "skipped" ? "text-red-400" : "text-gray-400";
    const sTot = Object.values(ep.miner_shards || {}).reduce((a, b) => a + b, 0);
    const mTot = Object.keys(ep.miner_shards || {}).length;
    const t = fmtTime(ep.timestamp);
    return `<th class="px-2 py-2 text-center min-w-[56px]"
      title="${esc(t.full)} | ${esc(status)} | ${mTot} miners | ${sTot} shards">
      <div class="font-mono font-bold text-white text-sm">${esc(eid)}</div>
      <div class="text-[10px] text-cyan-400 font-mono">${esc(t.short)}</div>
      <div class="text-[10px] ${statusCls}">${esc(status.slice(0, 4))}</div>
      <div class="text-[10px] text-gray-500">${mTot}m</div>
    </th>`;
  }).join("");

  document.getElementById("thead").innerHTML = `
    <tr class="bg-gray-900 border-b border-gray-700">
      <th class="px-3 py-2 text-left text-gray-400 sticky left-0 bg-gray-900 z-20">Wallet</th>
      <th class="px-2 py-2 text-center text-gray-400 text-xs">
        Reward<br><span class='text-[10px] text-gray-500'>${epochs.length}ep · ${WINDOW_HOURS}h</span>
      </th>
      <th class="px-2 py-2 text-center text-gray-400 text-xs">Shards</th>
      ${headerCells}
    </tr>
  `;

  // Rows
  const rows = display.map((addr, i) => {
    const total = addrReward.get(addr) || 0;
    const shardsTot = addrShards.get(addr) || 0;
    const hits = addrHits.get(addr) || 0;
    const isWatched = watchAddrs.has(addr);
    const label = isWatched ? (WATCH[addr] || "") : "";
    const rowCls = isWatched ? "watch-row" : "";

    const cells = epochs.map((ep) => {
      const r = (ep.rewards || {})[addr] || 0;
      const s = (ep.miner_shards || {})[addr] || 0;
      if (s === 0 && r === 0) {
        return '<td class="px-1 py-1 text-center text-gray-700 text-xs">—</td>';
      }
      if (r > 0) {
        const alpha = Math.min(0.85, r / (isWatched ? 150 : 200)).toFixed(2);
        const bg = isWatched ? `rgba(250,204,21,${alpha})` : `rgba(59,130,246,${alpha})`;
        return `<td class="px-1 py-1 text-center font-mono text-xs"
          style="background:${bg}"
          title="${s} shards · ${r.toFixed(2)} reward">${Math.round(r)}</td>`;
      }
      return `<td class="px-1 py-1 text-center text-gray-500 text-[10px]" title="${s} shards">${s}s</td>`;
    }).join("");

    const nameHtml = isWatched
      ? `<span class="text-yellow-300">★</span>
         ${label ? `<span class="font-bold text-yellow-300" title="${esc(addr)}">${esc(label)}</span>
                    <span class="text-[10px] text-gray-500 font-mono ml-1">${esc(shortAddr(addr))}</span>`
                 : `<span class="font-mono text-yellow-300" title="${esc(addr)}">${esc(shortAddr(addr))}</span>`}`
      : `<span class="font-mono" title="${esc(addr)}">${esc(shortAddr(addr))}</span>`;

    const totalCls = isWatched ? "text-yellow-300 font-bold" : (total > 0 ? "text-green-400 font-bold" : "text-gray-500");

    return `<tr class="border-b border-gray-800 hover:bg-gray-800/50 ${rowCls}">
      <td class="px-3 py-1 sticky left-0 bg-gray-900 z-10 whitespace-nowrap text-sm">
        <span class="text-gray-500 text-xs mr-2">#${i + 1}</span>
        ${nameHtml}
        <span class="text-[10px] text-gray-500 ml-1">· ${hits}ep</span>
      </td>
      <td class="px-2 py-1 text-center font-mono text-sm ${totalCls}">${fmtInt(total)}</td>
      <td class="px-2 py-1 text-center font-mono text-xs text-gray-400">${fmtInt(shardsTot)}</td>
      ${cells}
    </tr>`;
  }).join("");
  document.getElementById("tbody").innerHTML = rows || `<tr><td colspan="3" class="p-6 text-center text-gray-500">No data.</td></tr>`;

  // Footer: rewarded per epoch
  const footerCells = epochs.map((ep) => {
    const rewards = ep.rewards || {};
    const nReward = Object.values(rewards).filter((v) => v && v > 0).length;
    const mTot = Object.keys(ep.miner_shards || {}).length;
    return `<td class="px-1 py-2 text-center font-mono text-xs text-cyan-300"
      title="${nReward} rewarded / ${mTot} miners">${nReward}</td>`;
  }).join("");
  document.getElementById("tfoot").innerHTML = `
    <tr class="bg-gray-900 border-t-2 border-gray-600 font-bold">
      <td class="px-3 py-2 sticky left-0 bg-gray-900 z-10 whitespace-nowrap text-cyan-300 text-sm">Rewarded / epoch</td>
      <td class="px-2 py-2 text-center text-gray-500">—</td>
      <td class="px-2 py-2 text-center text-gray-500">—</td>
      ${footerCells}
    </tr>
  `;

  // Truncation notice
  const shownNonWatched = Math.min(TOP_N, nonWatchedRanked.length);
  if (nonWatchedRanked.length > shownNonWatched) {
    const full = new URL(location.href);
    full.searchParams.set("top", "all");
    document.getElementById("note").innerHTML =
      `Showing top <b>${shownNonWatched}</b> of <b>${nonWatchedRanked.length}</b> non-watched wallets (watched always shown). ` +
      `<a class="text-cyan-300 underline" href="${full.search}">Show all</a> · ` +
      `or try <code class="text-cyan-300">?top=200</code>.`;
  } else {
    document.getElementById("note").textContent = "";
  }

  document.getElementById("subtitle").innerHTML =
    `Public read-only view · last ${WINDOW_HOURS}h · data from ` +
    `<a class="text-cyan-400 hover:underline" href="https://aliceprotocol.org" target="_blank" rel="noopener">aliceprotocol.org</a>`;

  const updatedStr = updatedAt
    ? new Date(updatedAt * 1000).toISOString().replace("T", " ").slice(0, 19) + " UTC"
    : "—";
  document.getElementById("footer").innerHTML =
    `Data updated: ${updatedStr} · Page auto-refresh every 5 min · ` +
    `<a class="text-cyan-400 hover:underline" href="${DATA_URL}">raw JSON</a>`;
}

// ---------------------------------------------------------------------------
// Load & poll
// ---------------------------------------------------------------------------
async function load() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-cache" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    render(data);
  } catch (e) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="3" class="p-6 text-center text-red-400">Failed to load data: ${esc(e.message)}</td></tr>`;
  }
}

renderWatchUI();
load();
setInterval(load, AUTO_REFRESH_MS);
</script>
</body>
</html>
